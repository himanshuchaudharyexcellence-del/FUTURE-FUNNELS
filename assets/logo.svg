<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" fill="none">
  <defs>
    <!-- Cyan glow gradient for shield -->
    <linearGradient id="shieldFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#39FF14"/>
    </linearGradient>
    <!-- Subtle dark background for the icon -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1a2e"/>
      <stop offset="100%" stop-color="#0a1525"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00E5FF" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Shield icon background pill -->
  <rect x="4" y="8" width="64" height="64" rx="14" fill="url(#bgGrad)" stroke="#00E5FF" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Outer shield shape -->
  <path d="M36 16 C28 16 20 21 20 30 L20 46 C20 56 36 64 36 64 C36 64 52 56 52 46 L52 30 C52 21 44 16 36 16 Z"
        fill="url(#shieldFill)" opacity="0.15" filter="url(#glow)"/>
  <path d="M36 16 C28 16 20 21 20 30 L20 46 C20 56 36 64 36 64 C36 64 52 56 52 46 L52 30 C52 21 44 16 36 16 Z"
        stroke="url(#shieldFill)" stroke-width="2" stroke-linejoin="round" filter="url(#shadow)"/>

  <!-- Inner funnel icon (represents "Funnels") -->
  <!-- Funnel top horizontal line -->
  <line x1="25" y1="27" x2="47" y2="27" stroke="#00E5FF" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Funnel narrowing sides -->
  <line x1="25" y1="27" x2="30" y2="36" stroke="#00E5FF" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="47" y1="27" x2="42" y2="36" stroke="#00E5FF" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Funnel neck bar -->
  <line x1="30" y1="36" x2="42" y2="36" stroke="#00E5FF" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Funnel stem -->
  <line x1="36" y1="36" x2="36" y2="50" stroke="#39FF14" stroke-width="2" stroke-linecap="round"/>
  <!-- Stem dots to show flow -->
  <circle cx="36" cy="42" r="1.8" fill="#39FF14" opacity="0.9"/>
  <circle cx="36" cy="47" r="1.2" fill="#39FF14" opacity="0.6"/>
  <circle cx="36" cy="51" r="0.8" fill="#39FF14" opacity="0.3"/>

  <!-- Corner accents (HUD feel) -->
  <path d="M8 12 L8 8 L12 8" stroke="#00E5FF" stroke-opacity="0.5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M64 12 L64 8 L60 8" stroke="#00E5FF" stroke-opacity="0.5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M8 60 L8 64 L12 64" stroke="#00E5FF" stroke-opacity="0.5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M64 60 L64 64 L60 64" stroke="#00E5FF" stroke-opacity="0.5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Brand name text: FUTURE -->
  <text x="82" y="38"
        font-family="'Space Grotesk', 'Segoe UI', Arial, sans-serif"
        font-size="22"
        font-weight="700"
        letter-spacing="2"
        fill="#F3F4F6">FUTURE</text>

  <!-- Brand name text: FUNNELS (cyan) -->
  <text x="82" y="62"
        font-family="'Space Grotesk', 'Segoe UI', Arial, sans-serif"
        font-size="22"
        font-weight="700"
        letter-spacing="2"
        fill="#00E5FF"
        filter="url(#glow)">FUNNELS</text>

  <!-- Thin separator line between words -->
  <line x1="82" y1="44" x2="235" y2="44" stroke="#00E5FF" stroke-opacity="0.12" stroke-width="0.8"/>
</svg>
